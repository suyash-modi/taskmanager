spring.application.name=taskmanager

# Local defaults; override with env vars or use --spring.profiles.active=prod
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/taskdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT signing key (HS256 needs >= 256 bits). Override in production.
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey}

# Comma-separated origins for React dev server / deployed frontend
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}